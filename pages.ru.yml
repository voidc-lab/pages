site_name: Страницы Voidc

site_dir: site/ru
docs_dir: docs/ru

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/voidc-lab/voidc
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/voidc-lab/voidc

theme:
  name: material

  language: ru

  palette:
    # Light mode
    - scheme: default
      primary: white
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.tabs
    - navigation.footer

  logo:    ../img/black_square.svg
  favicon: ../img/black_square.svg

plugins:
  - search

markdown_extensions:
  - pymdownx.tilde
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - "Дом": index.md
  - Узнайте:
    - Что такое Void?: discover/index.md
  - Научитесь:
    - Начните сначала: learn/index.md
  - Используйте:
    - Просто делайте это: use/index.md
  - Развивайте:
    - Копайте глубже: develop/index.md
  - Улучшайте:
    - Сделайте это лучше: contribute/index.md



